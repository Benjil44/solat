<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — DJ Live</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#fff;font-family:Arial,Helvetica,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:24px;text-align:center}
    .logo{font-size:1.4em;font-weight:900;color:#ff4400;letter-spacing:3px;margin-bottom:8px}
    .tagline{color:#555;font-size:.9em;letter-spacing:1px;margin-bottom:32px}
    .card{background:#111;border:1px solid #2a2a2a;border-radius:18px;
      padding:32px 28px;max-width:360px;width:100%;text-align:left}
    .card-title{font-size:.72em;font-weight:bold;letter-spacing:2px;color:#ff4400;
      text-transform:uppercase;margin-bottom:18px;text-align:center}
    label{display:block;font-size:.78em;color:#666;margin-bottom:5px}
    input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;
      color:#fff;padding:9px 12px;font-size:.9em;outline:none;margin-bottom:14px}
    input:focus{border-color:#ff4400}
    .btn{width:100%;padding:13px;background:#ff4400;border:none;color:#fff;
      border-radius:9px;font-size:1em;font-weight:bold;cursor:pointer;letter-spacing:.5px}
    .btn:hover{background:#e03a00}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{margin-top:12px;font-size:.82em;min-height:1.2em;text-align:center}
    .msg.err{color:#ff6666}
    .msg.ok{color:#44cc88}
    .back{margin-top:20px;font-size:.82em;color:#555}
    .back a{color:#ff4400;text-decoration:none}
  </style>
</head>
<body>
  <div class="logo">DJ LIVE</div>
  <div class="tagline">RESET YOUR PASSWORD</div>

  <div class="card">
    <div class="card-title">Set New Password</div>
    <label>Username</label>
    <input type="text" id="rp-user" placeholder="Your username" autocomplete="username">
    <label>Reset Token <span style="color:#555;font-weight:normal">(from admin)</span></label>
    <input type="text" id="rp-token" placeholder="e.g. A3F9C2B1" autocomplete="off"
      style="letter-spacing:2px;font-family:monospace">
    <label>New Password</label>
    <input type="password" id="rp-pass" placeholder="Min 6 characters" autocomplete="new-password">
    <label>Confirm Password</label>
    <input type="password" id="rp-confirm" placeholder="Repeat new password" autocomplete="new-password">
    <button class="btn" id="rp-btn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="rp-msg"></div>
  </div>

  <div class="back"><a href="/">← Back to login</a></div>

<script>
  // Pre-fill username/token from URL params: /reset-password.html?u=name&t=TOKEN
  (function() {
    const p = new URLSearchParams(location.search);
    if (p.get('u')) document.getElementById('rp-user').value  = p.get('u');
    if (p.get('t')) document.getElementById('rp-token').value = p.get('t');
  })();

  async function doReset() {
    const btn      = document.getElementById('rp-btn');
    const msg      = document.getElementById('rp-msg');
    const username = document.getElementById('rp-user').value.trim();
    const token    = document.getElementById('rp-token').value.trim();
    const pass     = document.getElementById('rp-pass').value;
    const confirm  = document.getElementById('rp-confirm').value;

    msg.className = 'msg';
    msg.textContent = '';

    if (!username || !token || !pass) { msg.className='msg err'; msg.textContent='All fields required'; return; }
    if (pass.length < 6)              { msg.className='msg err'; msg.textContent='Password must be at least 6 characters'; return; }
    if (pass !== confirm)             { msg.className='msg err'; msg.textContent='Passwords do not match'; return; }

    btn.disabled    = true;
    btn.textContent = 'Saving…';
    try {
      const res  = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, token, newPassword: pass }),
      });
      const data = await res.json();
      if (!res.ok) { msg.className='msg err'; msg.textContent = data.error || 'Reset failed'; }
      else {
        msg.className='msg ok';
        msg.textContent = 'Password updated! Redirecting to login…';
        setTimeout(() => { window.location.href = '/'; }, 1800);
      }
    } catch {
      msg.className = 'msg err';
      msg.textContent = 'Network error — try again';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Set New Password';
    }
  }
</script>
</body>
</html>
