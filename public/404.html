<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — DJ Live</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#fff;font-family:Arial,Helvetica,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{text-align:center;padding:40px 20px}
    .disc{font-size:5em;animation:spin 4s linear infinite;display:inline-block;margin-bottom:24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:5em;font-weight:900;color:#ff4400;letter-spacing:4px;line-height:1}
    h2{font-size:1.2em;color:#666;margin:12px 0 32px;letter-spacing:2px;font-weight:normal}
    a{display:inline-block;padding:14px 32px;background:#ff4400;color:#fff;
      text-decoration:none;border-radius:8px;font-weight:bold;letter-spacing:1px;
      transition:.15s}
    a:hover{background:#e03d00}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="disc">💿</div>
    <h1>404</h1>
    <h2>THIS TRACK DOESN'T EXIST</h2>
    <a href="/">GO HOME</a>
  </div>
</body>
</html>
