<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Expired</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .box { max-width: 400px; }
    .icon { font-size: 4em; margin-bottom: 20px; }
    h1 { font-size: 1.8em; color: #ff4400; margin-bottom: 14px; }
    p { color: #888; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1em;
      margin: 4px;
    }
    .btn-primary { background: #ff4400; color: #fff; }
    .btn-primary:hover { background: #e03d00; }
    .btn-secondary { background: transparent; border: 1px solid #444; color: #aaa; }
    .btn-secondary:hover { border-color: #ff4400; color: #ff4400; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⏰</div>
    <h1>Free Trial Ended</h1>
    <p>Your 6-month free trial has expired.<br>Subscribe to keep watching.</p>
    <a class="btn btn-primary" href="/pricing.html">Subscribe Now</a>
    <a class="btn btn-secondary" href="/">Go Back</a>
  </div>
</body>
</html>
