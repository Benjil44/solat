<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Live Stream</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #ff4400; --bg: #000; --panel: rgba(0,0,0,0.85);
      --card: #111; --border: #222;
    }

    body { background: var(--bg); color: #fff; font-family: Arial,Helvetica,sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    #topbar { display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px; background:var(--panel); z-index:10; flex-shrink:0; gap:10px; }
    #topbar h1 { font-size:1.2em; font-weight:900; color:var(--accent); letter-spacing:2px; white-space:nowrap; }
    /* scrolling ticker */
    #stream-title-wrap { flex:1; overflow:hidden; min-width:0; display:flex; align-items:center; gap:8px; }
    #stream-title { display:inline-block; white-space:nowrap; font-size:.85em; color:#aaa; }
    #stream-title.scrolling { animation:title-scroll 18s ease-in-out infinite; }
    @keyframes title-scroll {
      0%,18%  { transform:translateX(0); }
      80%,100%{ transform:translateX(var(--overflow,-80px)); }
    }
    #viewer-badge { display:none; align-items:center; gap:5px; background:#1a1a1a;
      border:1px solid #333; border-radius:20px; padding:3px 10px; font-size:.75em;
      color:#aaa; white-space:nowrap; flex-shrink:0; }
    #viewer-badge.visible { display:flex; }
    #viewer-badge .vdot { width:7px; height:7px; border-radius:50%;
      background:var(--accent); animation:pulse 1.5s infinite; }
    .user-info { display:flex; align-items:center; gap:10px; font-size:.82em; flex-shrink:0; }
    #sub-badge { padding:3px 9px; border-radius:20px; font-size:.75em; font-weight:bold; }
    .badge-trial   { background:#332200; color:#ffcc00; }
    .badge-paid    { background:#002211; color:#44ff88; }
    .badge-expired { background:#220000; color:#ff6666; }
    .logout-btn { background:transparent; border:1px solid #444; color:#aaa;
      padding:4px 10px; border-radius:6px; cursor:pointer; font-size:.82em; }
    .logout-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Main area ── */
    #main { flex:1; display:flex; overflow:hidden; }

    /* ── Video side ── */
    #video-side { flex:1; position:relative; background:#000; display:flex; flex-direction:column; }
    #video-wrap  { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }

    /* Hidden video — still plays audio */
    video { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }

    /* Now-playing display */
    #now-playing { width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:22px; padding:20px; }
    #cover-wrap { position:relative; width:min(280px,60vw); aspect-ratio:1;
      border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.7); flex-shrink:0; }
    #cover-img { width:100%; height:100%; object-fit:cover; display:none; border-radius:16px; }
    #cover-placeholder { width:100%; height:100%; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; border-radius:16px; }
    #cover-placeholder .disc { font-size:5em; animation:spin-slow 4s linear infinite; }
    @keyframes spin-slow { to { transform:rotate(360deg); } }
    #now-title { font-size:clamp(1em,3vw,1.6em); font-weight:900; text-align:center;
      color:#fff; letter-spacing:1px; max-width:400px; line-height:1.3; }
    #now-sub { font-size:.8em; color:#666; letter-spacing:2px; text-transform:uppercase; }

    /* Pulsing glow when live */
    #cover-wrap.live { animation:glow-pulse 2s ease-in-out infinite; }
    @keyframes glow-pulse {
      0%,100% { box-shadow:0 8px 40px rgba(255,68,0,.3); }
      50%      { box-shadow:0 8px 60px rgba(255,68,0,.7); }
    }

    /* overlay (offline / buffering / tap-to-play) */
    #overlay { position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:rgba(0,0,0,.82); backdrop-filter:blur(10px); z-index:5; }
    #overlay-title { font-size:1.35em; font-weight:bold; color:#fff; margin:0; }
    #overlay-sub   { color:#666; font-size:.85em; text-align:center;
      max-width:280px; line-height:1.6; margin:0; }
    #overlay-countdown { font-size:.75em; color:#444; letter-spacing:1px; margin-top:-10px; }

    /* Spinning vinyl disc for loading states */
    .vinyl { width:96px; height:96px; border-radius:50%;
      background:radial-gradient(circle at 50%,#222 18%,#111 18%,#111 22%,#1a1a1a 22%,
        #0a0a0a 40%,#111 40%,#0d0d0d 55%,#111 55%,#0a0a0a 70%,#111 70%);
      border:3px solid #333; position:relative; flex-shrink:0; }
    .vinyl::after { content:''; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%); width:18px; height:18px; border-radius:50%;
      background:var(--accent); box-shadow:0 0 8px rgba(255,68,0,.6); }
    .vinyl.spinning { animation:vinyl-spin 1.8s linear infinite; }
    .vinyl.slow     { animation:vinyl-spin 4s linear infinite; opacity:.5; }
    @keyframes vinyl-spin { to { transform:rotate(360deg); } }

    /* Tap-to-play circle */
    .play-circle { width:80px; height:80px; border-radius:50%;
      background:rgba(255,68,0,.15); border:2px solid var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-size:2.2em; cursor:pointer; transition:.2s;
      animation:ring-pulse 1.8s ease-in-out infinite; }
    .play-circle:hover { background:rgba(255,68,0,.35); transform:scale(1.08); }
    @keyframes ring-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(255,68,0,.45); }
      50%      { box-shadow:0 0 0 16px rgba(255,68,0,0); }
    }

    /* LIVE badge */
    #live-badge { position:absolute; top:12px; left:12px; background:var(--accent); color:#fff;
      font-size:.75em; font-weight:bold; padding:3px 9px; border-radius:4px; letter-spacing:1px;
      z-index:6; display:none; }

    /* ── Buffer progress bar (top of screen while loading) ── */
    #buf-bar { position:fixed; top:0; left:0; height:3px; width:0%;
      background:var(--accent); z-index:100; transition:width .4s ease; pointer-events:none; }

    /* ── Bottom controls ── */
    #bottombar { padding:8px 14px; background:var(--panel); display:flex;
      align-items:center; gap:12px; flex-shrink:0; }
    #vol-label { font-size:.8em; color:#888; }
    input[type=range] { accent-color:var(--accent); cursor:pointer; }
    #volume { width:100px; }
    #fullscreen-btn { margin-left:auto; background:transparent; border:1px solid #444;
      color:#ccc; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:.82em; }
    #fullscreen-btn:hover { border-color:var(--accent); color:var(--accent); }
    #chat-toggle-btn { background:transparent; border:1px solid #444; color:#ccc;
      padding:5px 12px; border-radius:6px; cursor:pointer; font-size:.82em; }
    #chat-toggle-btn:hover { border-color:var(--accent); color:var(--accent); }
    #chat-toggle-btn.active { border-color:var(--accent); color:var(--accent); background:#1a0800; }

    /* ── Chat panel ── */
    #chat-panel { width:0; display:flex; flex-direction:column; background:var(--card);
      border-left:1px solid var(--border); transition:width .25s; overflow:hidden; flex-shrink:0; }
    #chat-panel.open { width:280px; }
    .chat-header { padding:10px 14px; border-bottom:1px solid var(--border);
      font-size:.75em; font-weight:bold; color:#666; letter-spacing:1px; flex-shrink:0; }
    #chat-messages { flex:1; overflow-y:auto; padding:10px 12px;
      display:flex; flex-direction:column; gap:5px; }
    .chat-msg { font-size:.8em; line-height:1.4; word-break:break-word; }
    .chat-msg .who { font-weight:bold; margin-right:5px; }
    .chat-msg.dj .who { color:var(--accent); }
    .chat-msg.viewer .who { color:#88aaff; }
    .chat-msg.system { color:#555; font-style:italic; }
    .chat-input-row { display:flex; gap:6px; padding:8px 10px;
      border-top:1px solid var(--border); flex-shrink:0; }
    .chat-input { flex:1; padding:7px 10px; background:#0a0a0a;
      border:1px solid var(--border); border-radius:6px; color:#fff; font-size:.82em; outline:none; }
    .chat-input:focus { border-color:var(--accent); }
    .chat-send-btn { padding:7px 12px; background:var(--accent); border:none;
      color:#fff; border-radius:6px; cursor:pointer; font-size:.8em; font-weight:bold; }
    .chat-send-btn:hover { background:#e03d00; }

    /* ─── Responsive ──────────────────────────────────────────── */

    /* Tablet: shrink chat panel */
    @media(max-width:900px){
      #chat-panel.open { width:240px; }
    }

    /* Mobile: chat becomes full-screen overlay, compress top bar */
    @media(max-width:600px){
      #topbar { padding:8px 10px; gap:6px; }
      #topbar h1 { font-size:1em; letter-spacing:1px; }
      #stream-title-wrap { max-width:120px; }
      #viewer-badge { display:none !important; }
      #sub-badge { display:none; }

      #volume { flex:1; width:auto; min-width:0; }
      #fullscreen-btn { display:none; }

      #main { position:relative; overflow:hidden; }
      #chat-panel { position:absolute; right:0; top:0; bottom:0;
        z-index:20; border-left:none; width:0; }
      #chat-panel.open { width:100%; }
    }
  </style>
</head>
<body>

  <div id="buf-bar"></div>

  <!-- Top bar -->
  <div id="topbar">
    <h1>DJ LIVE</h1>
    <div id="stream-title-wrap">
      <span id="stream-title"></span>
      <span id="viewer-badge"><span class="vdot"></span><span id="viewer-count">0</span> watching</span>
    </div>
    <div class="user-info">
      <span id="username-display"></span>
      <span id="sub-badge" class="badge-trial">...</span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Video side -->
    <div id="video-side">
      <div id="video-wrap">
        <span id="live-badge">LIVE</span>
        <!-- audio-only video element (invisible) -->
        <video id="player" autoplay playsinline muted></video>

        <!-- Now-playing display -->
        <div id="now-playing">
          <div id="cover-wrap">
            <img id="cover-img" alt="Cover art">
            <div id="cover-placeholder">
              <span class="disc">💿</span>
            </div>
          </div>
          <div id="now-title">DJ Live Session</div>
          <div id="now-sub">LIVE STREAM</div>
        </div>

        <div id="overlay">
          <div class="vinyl spinning"></div>
          <div id="overlay-title">Connecting…</div>
          <div id="overlay-sub">Please wait a moment</div>
        </div>
      </div>
      <div id="bottombar">
        <span id="vol-label">Vol</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8"
          oninput="setVolume(this.value)" id="volume">
        <button id="chat-toggle-btn" onclick="toggleChat()">💬 Chat</button>
        <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
      </div>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel">
      <div class="chat-header">LIVE CHAT</div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text"
          placeholder="Say something..." maxlength="200"
          onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send-btn" onclick="sendChat()">→</button>
      </div>
    </div>

  </div>

  <script>
    const video    = document.getElementById('player');
    const overlay  = document.getElementById('overlay');
    const liveBadge = document.getElementById('live-badge');
    const bufBar   = document.getElementById('buf-bar');
    let hls = null, pollTimer = null, heartbeatTimer = null, countdownInterval = null;
    let isPlaying = false, chatOpen = false, wsChat = null;
    let hlsErrCount = 0;
    let userToken = null;

    // ── Volume persistence ────────────────────────────────────
    const savedVol = parseFloat(localStorage.getItem('djVol') ?? '0.8');
    const volSlider = document.getElementById('volume');
    volSlider.value = savedVol;
    video.volume = savedVol;

    // ── Init ─────────────────────────────────────────────────
    async function init() {
      const res = await fetch('/auth/me');
      if (!res.ok) { window.location.href = '/'; return; }
      const data = await res.json();

      document.getElementById('username-display').textContent = data.username;
      const badge = document.getElementById('sub-badge');
      if (data.subscription.type === 'trial') {
        badge.textContent = `FREE − ${data.subscription.daysLeft}d`;
        badge.className = 'badge-trial';
      } else if (data.subscription.type === 'paid') {
        badge.textContent = `MEMBER − ${data.subscription.daysLeft}d`;
        badge.className = 'badge-paid';
      } else {
        badge.textContent = 'EXPIRED';
        badge.className = 'badge-expired';
      }

      // Get a token for chat — re-login to get token string from cookie
      // We pass it via the login response which sets the cookie;
      // for WS auth we'll call a dedicated endpoint
      const tokenRes = await fetch('/auth/token');
      if (tokenRes.ok) {
        const td = await tokenRes.json();
        userToken = td.token;
      }

      pollStatus();
      heartbeatTimer = setInterval(() => fetch('/api/heartbeat', { method:'POST' }).catch(()=>{}), 15000);
      connectChat();
    }

    // ── Now-playing display ───────────────────────────────────
    function setNowPlaying(title, coverUrl) {
      // topbar ticker
      const el = document.getElementById('stream-title');
      const wrap = document.getElementById('stream-title-wrap');
      el.classList.remove('scrolling');
      el.style.removeProperty('--overflow');
      el.textContent = title;
      requestAnimationFrame(() => {
        const overflow = el.scrollWidth - wrap.clientWidth + 60; // 60px breathing room
        if (overflow > 0) {
          el.style.setProperty('--overflow', `-${overflow}px`);
          el.classList.add('scrolling');
        }
      });
      // center display
      document.getElementById('now-title').textContent = title;
      // cover art
      const coverImg   = document.getElementById('cover-img');
      const placeholder = document.getElementById('cover-placeholder');
      if (coverUrl) {
        coverImg.src = coverUrl;
        coverImg.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        coverImg.style.display = 'none';
        placeholder.style.display = 'flex';
      }
    }

    // ── Poll stream ───────────────────────────────────────────
    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        if (!res.ok) { scheduleNextPoll(); return; }
        const d = await res.json();

        if (d.title) setNowPlaying(d.title, d.coverUrl || '');
        // viewer badge
        const vb = document.getElementById('viewer-badge');
        if (d.live && d.viewers > 0) {
          document.getElementById('viewer-count').textContent = d.viewers;
          vb.classList.add('visible');
        } else {
          vb.classList.remove('visible');
        }
        document.getElementById('cover-wrap').classList.toggle('live', !!d.live);

        if (d.live && !isPlaying) {
          startStream(d.streamKey);
        } else if (!d.live && isPlaying) {
          stopStream();
        } else if (!d.live) {
          showOffline();
        }
      } catch {}
      scheduleNextPoll();
    }

    function scheduleNextPoll() {
      clearTimeout(pollTimer);
      // Poll every 3s while offline, every 8s while playing (less pressure)
      pollTimer = setTimeout(pollStatus, isPlaying ? 8000 : 3000);
    }

    // ── HLS playback ──────────────────────────────────────────
    function startStream(streamKey) {
      const url = '/live/live/' + streamKey + '/index.m3u8';

      // Show connecting state — don't hide overlay until manifest confirmed
      showConnecting();

      // Animate buffer bar to show loading progress
      let bufPct = 10;
      bufBar.style.width = bufPct + '%';
      const bufInterval = setInterval(() => {
        bufPct = Math.min(bufPct + 6, 85);
        bufBar.style.width = bufPct + '%';
      }, 800);
      function finishBufBar() {
        clearInterval(bufInterval);
        bufBar.style.width = '100%';
        setTimeout(() => { bufBar.style.width = '0%'; }, 500);
      }

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls({
          lowLatencyMode: false,
          enableWorker: true,
          maxBufferLength: 45,
          maxMaxBufferLength: 90,
          liveSyncDurationCount: 4,        // start 8s behind live (4 × 2s segments)
          liveMaxLatencyDurationCount: 8,  // never more than 16s behind; server keeps 24s
          liveSyncOnStallEnabled: true,
          maxBufferHole: 1.0,          // tolerate up to 1s holes without stalling
          nudgeMaxRetry: 8,            // retry nudge before giving up on stall
          highBufferWatchdogPeriod: 3, // check for high-buffer stall every 3s
          manifestLoadingMaxRetry: 4,
          manifestLoadingRetryDelay: 1000,
          manifestLoadingMaxRetryTimeout: 8000,
          levelLoadingMaxRetry: 12,
          levelLoadingRetryDelay: 2000,
          fragLoadingMaxRetry: 12,
          fragLoadingRetryDelay: 500,  // 500ms retry — new segment appears every 2s
        });
        let manifestLoaded = false;
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          manifestLoaded = true;
          isPlaying = true;
          hlsErrCount = 0;
          finishBufBar();
          hideOverlay();
          liveBadge.style.display = 'block';
          video.volume = 0;
          video.muted  = true;
          const targetVol = parseFloat(document.getElementById('volume').value);
          video.play().then(() => {
            video.muted = false;
            let v = 0;
            const fadeIn = setInterval(() => {
              v = Math.min(v + 0.05, targetVol);
              video.volume = v;
              if (v >= targetVol) clearInterval(fadeIn);
            }, 60);
          }).catch(showPlayPrompt);
        });

        // Reset error counter every time a fragment loads successfully
        hls.on(Hls.Events.FRAG_LOADED, () => { hlsErrCount = 0; });

        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return;  // HLS.js handles non-fatal errors internally
          hlsErrCount++;

          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            if (!manifestLoaded) {
              // Manifest still 404 — destroy and let poll call startStream again in 3s
              const delay = Math.min(500 * hlsErrCount, 3000);
              setTimeout(() => { if (hls) { hls.destroy(); hls = null; } isPlaying = false; }, delay);
            } else {
              // Segment temporarily unavailable (live edge, network hiccup) — wait & retry
              const delay = Math.min(500 * hlsErrCount, 4000);
              setTimeout(() => { if (hls) hls.startLoad(); }, delay);
            }

          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            // Corrupt/incomplete segment — recover the codec in-place, no overlay shown
            setTimeout(() => { if (hls) hls.recoverMediaError(); }, 200);

          } else {
            // Truly unrecoverable (e.g. browser won't play HLS at all)
            finishBufBar(); stopStream();
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS (some smart TVs / Safari)
        video.src = url;
        video.onloadedmetadata = () => {
          isPlaying = true;
          hideOverlay();
          liveBadge.style.display = 'block';
        };
        video.play().catch(showPlayPrompt);
      } else {
        showOverlay('Browser not supported', 'Please update your browser');
        return;
      }
      // Mark as "attempting" so poll doesn't restart the whole load
      isPlaying = true;
    }

    function stopStream() {
      if (hls) { hls.destroy(); hls = null; }
      video.src = '';
      isPlaying = false;
      liveBadge.style.display = 'none';
      showOffline();
    }

    // ── Overlay helpers ───────────────────────────────────────
    function showOffline() {
      clearInterval(countdownInterval);
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="vinyl slow"></div>
        <div id="overlay-title">DJ Offline</div>
        <div id="overlay-sub">We'll connect you automatically when the DJ goes live.</div>
        <div id="overlay-countdown">Checking soon…</div>`;

      let secs = isPlaying ? 8 : 3;
      const tick = () => {
        const el = document.getElementById('overlay-countdown');
        if (!el) { clearInterval(countdownInterval); return; }
        el.textContent = secs > 0 ? `Checking in ${secs}s` : 'Checking…';
        if (--secs < 0) secs = isPlaying ? 7 : 2;
      };
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    function showConnecting() {
      clearInterval(countdownInterval);
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="vinyl spinning"></div>
        <div id="overlay-title">Connecting to stream…</div>
        <div id="overlay-sub">DJ is live — loading segments</div>`;
    }

    function showPlayPrompt() {
      clearInterval(countdownInterval);
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="play-circle" onclick="manualPlay()">▶</div>
        <div id="overlay-title">Tap to Play</div>
        <div id="overlay-sub">Your browser requires a tap to start audio</div>`;
    }
    function showOverlay(title, sub) {
      clearInterval(countdownInterval);
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="vinyl slow"></div>
        <div id="overlay-title">${title}</div>
        <div id="overlay-sub">${sub}</div>`;
    }
    function hideOverlay() { clearInterval(countdownInterval); overlay.style.display = 'none'; }
    function manualPlay() { video.muted = false; video.play(); hideOverlay(); }

    // ── Controls ──────────────────────────────────────────────
    function setVolume(v) {
      video.volume = parseFloat(v);
      video.muted  = false;
      localStorage.setItem('djVol', v);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
    }

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      document.getElementById('chat-toggle-btn').classList.toggle('active', chatOpen);
    }

    async function doLogout() {
      await fetch('/auth/logout', { method:'POST' });
      window.location.href = '/';
    }

    // ── Chat ──────────────────────────────────────────────────
    function connectChat() {
      if (!userToken) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      wsChat = new WebSocket(`${proto}://${location.host}/ws/chat?token=${encodeURIComponent(userToken)}`);

      wsChat.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'history') msg.messages.forEach(m => appendChat(m));
          else {
            appendChat(msg);
            // Instant title refresh when DJ sets a new track
            if (msg.type === 'system' && msg.text && msg.text.startsWith('Now playing:')) {
              pollStatus();
            }
          }
        } catch {}
      };
      wsChat.onclose = () => { setTimeout(connectChat, 4000); };
      wsChat.onerror = () => {};
    }

    function appendChat(msg) {
      const el = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + (msg.type === 'system' ? 'system' : (msg.isDJ ? 'dj' : 'viewer'));
      if (msg.type === 'system') {
        div.textContent = msg.text;
      } else {
        div.innerHTML = `<span class="who">${esc(msg.username)}:</span>${esc(msg.text)}`;
      }
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
      while (el.children.length > 200) el.removeChild(el.firstChild);
      // Badge notification if chat is closed
      if (!chatOpen) {
        const btn = document.getElementById('chat-toggle-btn');
        btn.textContent = '💬 Chat •';
      }
    }

    function sendChat() {
      const input = document.getElementById('chat-input');
      const text  = input.value.trim();
      if (!text || !wsChat || wsChat.readyState !== WebSocket.OPEN) return;
      wsChat.send(JSON.stringify({ type: 'chat', text }));
      input.value = '';
    }

    // Clear notification dot when chat is opened
    document.getElementById('chat-toggle-btn').addEventListener('click', () => {
      document.getElementById('chat-toggle-btn').textContent = '💬 Chat';
    });

    function esc(s) {
      return String(s).replace(/[&<>"']/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    init();
  </script>
</body>
</html>
