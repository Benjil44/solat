<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }
    h1 {
      font-size: 1.5em;
      color: #ff4400;
      margin-bottom: 28px;
      letter-spacing: 2px;
      text-align: center;
    }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9em; }
    input {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1em;
      outline: none;
      margin-bottom: 18px;
    }
    input:focus { border-color: #ff4400; }
    button {
      width: 100%;
      padding: 14px;
      background: #ff4400;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e03d00; }
    .err {
      display: none;
      color: #ff6666;
      background: #2a0a0a;
      border: 1px solid #aa2222;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>DJ ADMIN</h1>
    <div class="err" id="err"></div>
    <label>ADMIN KEY</label>
    <input type="password" id="key" placeholder="Enter your admin key">
    <button onclick="login()">Enter Dashboard</button>
  </div>
  <script>
    async function login() {
      const key = document.getElementById('key').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      if (!key) { err.textContent = 'Enter the admin key'; err.style.display = 'block'; return; }
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      });
      if (res.ok) {
        window.location.href = '/admin.html';
      } else {
        const d = await res.json();
        err.textContent = d.error || 'Wrong key';
        err.style.display = 'block';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
