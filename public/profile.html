<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — DJ Live</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--card:#111;--border:#1e1e1e;--accent:#ff4400;--muted:#555;--text:#ccc}
    body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh}

    /* ── Header ── */
    .topbar{display:flex;align-items:center;gap:16px;padding:14px 20px;
      background:#0d0d0d;border-bottom:1px solid var(--border);}
    .topbar-logo{font-size:1.1em;font-weight:900;color:var(--accent);letter-spacing:2px}
    .topbar-back{margin-left:auto;font-size:.82em;color:var(--muted);text-decoration:none;
      padding:6px 14px;border:1px solid #2a2a2a;border-radius:6px;transition:.15s}
    .topbar-back:hover{color:#fff;border-color:#444}
    .topbar-logout{font-size:.82em;color:var(--muted);background:none;border:none;cursor:pointer;
      padding:6px 14px;border:1px solid #2a2a2a;border-radius:6px;transition:.15s}
    .topbar-logout:hover{color:#ff4400;border-color:#ff4400}

    /* ── Layout ── */
    .wrap{max-width:700px;margin:32px auto;padding:0 16px}

    /* ── Profile card ── */
    .profile-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:28px 32px;margin-bottom:20px;display:flex;align-items:center;gap:24px}
    .avatar{width:64px;height:64px;border-radius:50%;background:#1a1a1a;
      border:2px solid #2a2a2a;display:flex;align-items:center;justify-content:center;
      font-size:1.8em;flex-shrink:0}
    .profile-info{flex:1}
    .profile-username{font-size:1.5em;font-weight:900;color:#fff;letter-spacing:1px;margin-bottom:6px}
    .profile-reg{font-size:.78em;color:var(--muted);margin-bottom:10px}
    .sub-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;
      border-radius:20px;font-size:.78em;font-weight:bold;letter-spacing:1px;border:1px solid}
    .sub-trial{border-color:#cc9900;color:#cc9900;background:#1a1200}
    .sub-paid{border-color:#00aa44;color:#00cc55;background:#001a0a}
    .sub-expired{border-color:#882200;color:#cc3300;background:#1a0500}
    .sub-days{margin-left:8px;font-size:.82em;color:var(--muted);font-weight:normal}

    /* ── Stats mini-row ── */
    .stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .mini-stat{flex:1;min-width:80px;background:#161616;border:1px solid var(--border);
      border-radius:10px;padding:10px 14px;text-align:center}
    .mini-stat .mval{font-size:1.6em;font-weight:900;color:var(--accent)}
    .mini-stat .mlbl{font-size:.72em;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

    /* ── Requests card ── */
    .req-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:20px 24px}
    .req-card-title{font-size:.72em;font-weight:bold;letter-spacing:2px;color:var(--muted);
      text-transform:uppercase;margin-bottom:14px}
    .req-empty{color:var(--muted);font-size:.88em;text-align:center;padding:20px 0}
    .req-row{display:flex;align-items:center;gap:10px;padding:8px 0;
      border-bottom:1px solid var(--border);font-size:.85em}
    .req-row:last-child{border-bottom:none}
    .req-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ddd}
    .req-status{flex-shrink:0;font-size:.7em;font-weight:bold;letter-spacing:1px;
      padding:2px 8px;border-radius:10px;border:1px solid}
    .rs-pending{border-color:#555;color:#888}
    .rs-accepted{border-color:#4488ff;color:#4488ff;background:#001025}
    .rs-played{border-color:#00aa44;color:#00cc55;background:#001a0a}
    .rs-rejected{border-color:#882200;color:#aa3300}
    .req-votes{flex-shrink:0;color:#888;font-size:.8em}
    .req-date{flex-shrink:0;color:var(--muted);font-size:.75em}

    /* ── Action cards ── */
    .action-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:20px 24px;margin-bottom:20px}
    .action-card-title{font-size:.72em;font-weight:bold;letter-spacing:2px;color:var(--muted);
      text-transform:uppercase;margin-bottom:14px}
    .form-row{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .form-label{font-size:.78em;color:var(--muted)}
    .form-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;
      color:#fff;padding:8px 12px;font-size:.88em;outline:none;width:100%}
    .form-input:focus{border-color:var(--accent)}
    .btn-primary{padding:8px 22px;background:var(--accent);border:none;color:#fff;
      border-radius:7px;cursor:pointer;font-size:.85em;font-weight:bold}
    .btn-primary:hover{background:#e03a00}
    .btn-danger-outline{padding:8px 22px;background:transparent;border:1px solid #882200;
      color:#cc3300;border-radius:7px;cursor:pointer;font-size:.85em}
    .btn-danger-outline:hover{background:#1a0500;border-color:#ff4444;color:#ff6666}
    .form-msg{font-size:.8em;margin-top:6px;min-height:1.2em}
    .form-msg.ok{color:#44cc88}
    .form-msg.err{color:#ff6666}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">DJ LIVE</div>
    <a class="topbar-back" href="/watch.html">← Back to Stream</a>
    <button class="topbar-logout" onclick="doLogout()">Log out</button>
  </div>

  <div class="wrap">
    <div class="profile-card" id="profile-card">
      <div class="avatar">🎵</div>
      <div class="profile-info">
        <div class="profile-username" id="p-username">Loading…</div>
        <div class="profile-reg" id="p-reg"></div>
        <span class="sub-pill" id="p-sub-pill"></span>
        <span class="sub-days" id="p-days"></span>
      </div>
    </div>

    <div class="req-card">
      <div class="req-card-title">Your Requests</div>
      <div class="stats-row" id="p-stats-row" style="display:none">
        <div class="mini-stat"><div class="mval" id="ps-total">0</div><div class="mlbl">Total</div></div>
        <div class="mini-stat"><div class="mval" id="ps-accepted">0</div><div class="mlbl">Accepted</div></div>
        <div class="mini-stat"><div class="mval" id="ps-played">0</div><div class="mlbl">Played</div></div>
        <div class="mini-stat"><div class="mval" id="ps-pending">0</div><div class="mlbl">Pending</div></div>
        <div class="mini-stat"><div class="mval" id="ps-rejected">0</div><div class="mlbl">Rejected</div></div>
      </div>
      <div id="p-req-list"><div class="req-empty">Loading…</div></div>
    </div>

    <!-- Change Password -->
    <div class="action-card">
      <div class="action-card-title">Change Password</div>
      <div class="form-row">
        <label class="form-label">Current Password</label>
        <input class="form-input" type="password" id="cp-current" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-row">
        <label class="form-label">New Password</label>
        <input class="form-input" type="password" id="cp-new" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <div class="form-row">
        <label class="form-label">Confirm New Password</label>
        <input class="form-input" type="password" id="cp-confirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="changePassword()">Update Password</button>
      <div class="form-msg" id="cp-msg"></div>
    </div>

    <!-- Delete Account -->
    <div class="action-card" style="border-color:#330000">
      <div class="action-card-title" style="color:#882200">Danger Zone</div>
      <p style="font-size:.82em;color:var(--muted);margin-bottom:14px">
        Permanently delete your account and all your data. This cannot be undone.
      </p>
      <div class="form-row">
        <label class="form-label">Confirm with your password</label>
        <input class="form-input" type="password" id="del-pw" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-danger-outline" onclick="deleteAccount()">Delete My Account</button>
      <div class="form-msg" id="del-msg"></div>
    </div>
  </div>

  <script>
    function esc(s) {
      return String(s).replace(/[&<>"']/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function loadProfile() {
      const res = await fetch('/api/profile');
      if (!res.ok) { window.location.href = '/'; return; }
      const d = await res.json();
      render(d);
    }

    function render({ user, requests, stats }) {
      document.title = user.username + ' — DJ Live';
      document.getElementById('p-username').textContent = user.username;
      document.getElementById('p-reg').textContent =
        'Member since ' + new Date(user.registeredAt).toLocaleDateString('en-GB', { year:'numeric', month:'long' });

      const pill = document.getElementById('p-sub-pill');
      pill.className = 'sub-pill sub-' + user.subType;
      pill.textContent = user.subType === 'trial' ? 'FREE TRIAL'
                       : user.subType === 'paid'  ? 'MEMBER'
                       : 'EXPIRED';

      const days = document.getElementById('p-days');
      if (user.subType === 'expired') {
        days.textContent = '';
      } else {
        days.textContent = user.daysLeft + ' day' + (user.daysLeft !== 1 ? 's' : '') + ' remaining';
      }

      if (stats && stats.total > 0) {
        document.getElementById('p-stats-row').style.display = 'flex';
        document.getElementById('ps-total').textContent    = stats.total;
        document.getElementById('ps-accepted').textContent = stats.accepted;
        document.getElementById('ps-played').textContent   = stats.played;
        document.getElementById('ps-pending').textContent  = stats.pending;
        document.getElementById('ps-rejected').textContent = stats.rejected;
      }

      const list = document.getElementById('p-req-list');
      if (!requests.length) {
        list.innerHTML = '<div class="req-empty">No requests yet — switch to the Requests tab to make one!</div>';
        return;
      }
      const statusClass = { pending:'rs-pending', accepted:'rs-accepted', played:'rs-played', rejected:'rs-rejected' };
      list.innerHTML = requests.map(r => {
        const date = new Date(r.requestedAt).toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
        return `<div class="req-row">
          <span class="req-title" title="${esc(r.title)}">${esc(r.title)}</span>
          <span class="req-status ${statusClass[r.status] || 'rs-pending'}">${r.status.toUpperCase()}</span>
          <span class="req-votes">★ ${r.votes}</span>
          <span class="req-date">${date}</span>
        </div>`;
      }).join('');
    }

    async function changePassword() {
      const current  = document.getElementById('cp-current').value;
      const newPw    = document.getElementById('cp-new').value;
      const confirm  = document.getElementById('cp-confirm').value;
      const msg      = document.getElementById('cp-msg');
      msg.className  = 'form-msg';
      if (!current || !newPw || !confirm) { msg.className = 'form-msg err'; msg.textContent = 'All fields are required.'; return; }
      if (newPw.length < 6)              { msg.className = 'form-msg err'; msg.textContent = 'New password must be at least 6 characters.'; return; }
      if (newPw !== confirm)             { msg.className = 'form-msg err'; msg.textContent = 'Passwords do not match.'; return; }
      const res  = await fetch('/auth/change-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: current, newPassword: newPw })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className  = 'form-msg ok';
        msg.textContent = 'Password updated successfully!';
        document.getElementById('cp-current').value = '';
        document.getElementById('cp-new').value     = '';
        document.getElementById('cp-confirm').value = '';
      } else {
        msg.className  = 'form-msg err';
        msg.textContent = data.error || 'Failed to update password.';
      }
    }

    async function deleteAccount() {
      const pw  = document.getElementById('del-pw').value;
      const msg = document.getElementById('del-msg');
      msg.className = 'form-msg';
      if (!pw) { msg.className = 'form-msg err'; msg.textContent = 'Enter your password to confirm.'; return; }
      if (!confirm('Permanently delete your account?\n\nThis cannot be undone.')) return;
      const res  = await fetch('/auth/delete-account', {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/?deleted=1';
      } else {
        msg.className  = 'form-msg err';
        msg.textContent = data.error || 'Failed to delete account.';
      }
    }

    async function doLogout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    loadProfile();
  </script>
</body>
</html>
