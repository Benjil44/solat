# ─── DJ Stream — Nginx Reverse Proxy ────────────────────────────────────────
#
# Prerequisites:
#   1. Install nginx:           sudo apt install nginx
#   2. Get a TLS certificate:   sudo certbot --nginx -d yourdomain.com
#   3. Place this file:         /etc/nginx/sites-available/dj-stream
#   4. Enable it:               sudo ln -s /etc/nginx/sites-available/dj-stream /etc/nginx/sites-enabled/
#   5. Test + reload:           sudo nginx -t && sudo systemctl reload nginx
#
# Replace every occurrence of:
#   yourdomain.com   → your actual domain
#   /etc/letsencrypt → correct path if certbot put certs elsewhere
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # TLS — Let's Encrypt (certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (supplements helmet.js on the Node side) ────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-mpegurl video/mp2t;
    gzip_min_length 256;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dj-stream.access.log;
    error_log  /var/log/nginx/dj-stream.error.log;

    # ── Upstream proxy settings ───────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── WebSocket upgrade (stream + chat) ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;   # keep WS connections open up to 1 hour
        proxy_send_timeout 3600s;
    }

    # ── Stripe webhook — larger body, no buffering ────────────────────────────
    location /payment/webhook {
        proxy_pass            http://127.0.0.1:3000;
        proxy_request_buffering off;
        client_max_body_size  1m;
    }

    # ── All other traffic ─────────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        client_max_body_size 50m;   # allow large file uploads if needed
    }
}

# ─── RTMP (port 1935) ──────────────────────────────────────────────────────────
# RTMP is a raw TCP protocol — nginx handles it with the nginx-rtmp-module.
# If you're not using nginx-rtmp-module, leave port 1935 open directly to
# node-media-server (firewall allows it; nginx does not proxy it).
#
# To block RTMP externally and only allow OBS from specific IPs:
#   ufw allow from YOUR_OBS_IP to any port 1935
#   ufw deny 1935

# ─── Block direct access to NMS port 8888 (raw HLS) ──────────────────────────
# node-media-server HTTP port is now bound to 127.0.0.1 in server.js,
# so it is already unreachable externally. For extra safety, also block it:
#   ufw deny 8888
